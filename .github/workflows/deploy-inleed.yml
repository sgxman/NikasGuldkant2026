name: Deploy nikasguldkant.se to Inleed

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build -- --base=/

      - name: Deploy dist to Inleed over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.INLEED_HOST }}
          port: ${{ secrets.INLEED_PORT }}
          username: ${{ secrets.INLEED_USERNAME }}
          password: ${{ secrets.INLEED_PASSWORD }}
          local_path: './dist/*'
          remote_path: '/home/s143454/domains/nikasguldkant.se/public_html/'
          sftp_only: true          
